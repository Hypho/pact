name: PACT Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pact-check:
    name: PACT self-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck lint
        run: shellcheck .pact/bin/*.sh .pact/hooks/*.sh scripts/*.sh

      - name: Run PACT checks
        run: bash .pact/bin/pact-check.sh
