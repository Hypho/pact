name: PACT Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pact-check:
    name: PACT self-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PACT checks
        run: bash .pact/bin/pact-check.sh
